          \ m.group()[:4] + '********' + m.group()[-4:],\n        \"desc\": \"银行卡号\"\
          ,\n    },\n}\n\ndef main(user_query: str) -> dict:\n    text = user_query\n\
          \    found_types = []\n    \n    for key, rule in SENSITIVE_PATTERNS.items():\n\
          \        pattern = rule[\"pattern\"]\n        replace = rule[\"replace\"\
