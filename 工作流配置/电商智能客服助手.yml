    - data:
        code: "import json\nimport re\n\ndef main(intent_result: str) -> dict:\n \
          \   try:\n        text = intent_result.strip()\n        \n        # 1. 去除\
          \ <think>...</think> 标签\n        text = re.sub(r'<think>.*?</think>', '',\
          \ text, flags=re.DOTALL).strip()\n        \n        # 2. 去除 markdown 代码块\n\
          \        text = re.sub(r'^```(?:json)?\\s*\\n?', '', text)\n        text\
          \ = re.sub(r'\\n?```\\s*$', '', text)\n        text = text.strip()\n   \
          \     \n        # 3. 提取 JSON 对象\n        match = re.search(r'\\{[^{}]*\"\
          intent\"[^{}]*\\}', text, re.DOTALL)\n        if match:\n            json_str\
          \ = match.group(0)\n            result = json.loads(json_str)\n        \
          \    return {\n                \"intent\": result.get(\"intent\", \"其他\"\
          ),\n                \"confidence\": float(result.get(\"confidence\", 0)),\n\
          \                \"reason\": result.get(\"reason\", \"\")\n            }\n\
          \        \n        result = json.loads(text)\n        return {\n       \
          \     \"intent\": result.get(\"intent\", \"其他\"),\n            \"confidence\"\
          : float(result.get(\"confidence\", 0)),\n            \"reason\": result.get(\"\
          reason\", \"\")\n        }\n        \n    except Exception as e:\n     \
          \   return {\n            \"intent\": \"其他\",\n            \"confidence\"\
          : 0.0,\n            \"reason\": f\"解析失败: {str(e)[:30]}\"\n        }\n"
        code_language: python3
        outputs:
          confidence:
            children: null
            type: number
          intent:
            children: null
            type: string
          reason:
            children: null
            type: string
