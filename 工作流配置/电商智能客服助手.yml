        code: "import re\n\nABSOLUTE_WORDS = [\"最好\", \"第一\", \"唯一\", \"顶级\", \"极致\"\
          , \"100%\", \"绝对\", \"肯定能\", \"一定能\", \"保证\", \"永久\", \"万能\", \"国家级\", \"\
          世界级\", \"最高级\", \"最佳\", \"最优\"]\nMONEY_PROMISE_PATTERN = r'(赔偿|补偿|退款|赔付).*?(\\\
          d+)元'\nCOMPETITOR_KEYWORDS = [\"拼多多\", \"京东\", \"抖音\", \"快手\", \"1688\"\
          ]\n\ndef main(ai_answer: str) -> dict:\n    text = ai_answer\n    checks\
          \ = []\n    \n    # 1. 隐私泄露\n    if re.search(r'1[3-9]\\d{9}', text):\n\
          \        checks.append({\"type\": \"隐私泄露\", \"detail\": \"包含手机号\"})\n  \
          \  if re.search(r'\\d{17}[\\dXx]', text):\n        checks.append({\"type\"\
          : \"隐私泄露\", \"detail\": \"包含身份证号\"})\n    \n    # 2. 不当金额承诺\n    match =\
          \ re.search(MONEY_PROMISE_PATTERN, text)\n    if match:\n        amount\
          \ = int(match.group(2))\n        if amount > 100:\n            checks.append({\"\
          type\": \"不当承诺\", \"detail\": f\"承诺金额{amount}元超出权限\"})\n        elif amount\
          \ > 0:\n            checks.append({\"type\": \"需注意\", \"detail\": f\"包含金额承诺{amount}元\"\
          })\n    \n    # 3. 提示词泄露\n    if re.search(r'(?i)(system\\s*prompt|系统提示词|ignore.*instructions|忽略.*指令)',\
          \ text):\n        checks.append({\"type\": \"提示词泄露\", \"detail\": \"疑似泄露系统指令\"\
          })\n    \n    # 4. 绝对化用语\n    found = [w for w in ABSOLUTE_WORDS if w in\
          \ text]\n    if found:\n        checks.append({\"type\": \"绝对化用语\", \"detail\"\
          : f\"包含: {', '.join(found)}\"})\n    \n    # 5. 竞品提及\n    found_comp = [w\
          \ for w in COMPETITOR_KEYWORDS if w in text]\n    if found_comp:\n     \
          \   checks.append({\"type\": \"竞品提及\", \"detail\": f\"提到: {', '.join(found_comp)}\"\
          })\n    \n    is_safe = len(checks) == 0\n    \n    if is_safe:\n      \
          \  return {\"is_safe\": True, \"checks\": [], \"filtered_answer\": text,\
          \ \"audit_action\": \"pass\"}\n    \n    severe = {\"隐私泄露\", \"提示词泄露\",\
          \ \"不当承诺\"}\n    has_severe = any(c[\"type\"] in severe for c in checks)\n\
          \    \n    if has_severe:\n        return {\n            \"is_safe\": False,\n\
          \            \"filtered_answer\": \"亲，抱歉系统遇到了一些问题，建议您联系人工客服处理哦~\\n\U0001F4A1\
          \ 工作时间：每天 9:00 - 22:00\\n\U0001F4E9 输入「转人工」可立即接入\",\n            \"audit_action\"\
          : \"block\",\n        }\n    \n    return {\"is_safe\": True, \"filtered_answer\"\
          : text, \"audit_action\": \"flag\"}\n"
